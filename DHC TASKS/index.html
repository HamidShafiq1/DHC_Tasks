<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
    h1 { color: #00ff88; margin-bottom: 30px; font-size: 1.6rem; letter-spacing: 1px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
    .tab { padding: 8px 20px; background: #1e1e1e; border: 1px solid #333; border-radius: 4px; cursor: pointer; color: #aaa; transition: all 0.2s; }
    .tab.active { background: #00ff88; color: #000; font-weight: bold; border-color: #00ff88; }
    .panel { display: none; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 30px; width: 100%; max-width: 420px; }
    .panel.active { display: block; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #00ff88; }
    button { margin-top: 20px; width: 100%; padding: 11px; background: #00ff88; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #00dd77; }
    .msg { margin-top: 14px; font-size: 0.88rem; padding: 8px 12px; border-radius: 4px; }
    .msg.success { background: #0a2e1a; color: #00ff88; border: 1px solid #00ff88; }
    .msg.error { background: #2e0a0a; color: #ff6666; border: 1px solid #ff4444; }
    pre { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 12px; font-size: 0.82rem; margin-top: 14px; white-space: pre-wrap; word-break: break-all; color: #aaffcc; }
  </style>
</head>
<body>
  <h1>User Management System</h1>
  <div class="tabs">
    <div class="tab active" onclick="show('signup')">Signup</div>
    <div class="tab" onclick="show('login')">Login</div>
    <div class="tab" onclick="show('profile')">Profile</div>
  </div>

  <!-- SIGNUP -->
  <div id="signup" class="panel active">
    <label>Username</label>
    <input type="text" id="su-username" placeholder="Enter username" />
    <label>Email</label>
    <input type="email" id="su-email" placeholder="Enter email" />
    <label>Password</label>
    <input type="password" id="su-password" placeholder="Min 8 characters" />
    <button onclick="signup()">Create Account</button>
    <div id="su-msg"></div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="panel">
    <label>Email</label>
    <input type="email" id="ln-email" placeholder="Enter email" />
    <label>Password</label>
    <input type="password" id="ln-password" placeholder="Enter password" />
    <button onclick="login()">Login</button>
    <div id="ln-msg"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="panel">
    <button onclick="getProfile()">Fetch My Profile</button>
    <div id="pf-data"></div>
    <label style="margin-top:20px">Update Username</label>
    <input type="text" id="pf-username" placeholder="New username" />
    <button onclick="updateProfile()">Update</button>
    <div id="pf-msg"></div>
  </div>

  <script>
    let token = localStorage.getItem('token') || '';

    function show(tab) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelectorAll('.tab')[['signup','login','profile'].indexOf(tab)].classList.add('active');
    }

    function msg(id, text, type) {
      const el = document.getElementById(id);
      el.className = 'msg ' + type;
      el.textContent = text;
    }

    async function signup() {
      const username = document.getElementById('su-username').value;
      const email = document.getElementById('su-email').value;
      const password = document.getElementById('su-password').value;
      const r = await fetch('/api/auth/signup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, email, password}) });
      const d = await r.json();
      msg('su-msg', d.message || d.error, r.ok ? 'success' : 'error');
    }

    async function login() {
      const email = document.getElementById('ln-email').value;
      const password = document.getElementById('ln-password').value;
      const r = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
      const d = await r.json();
      if (r.ok) {
        token = d.token;
        localStorage.setItem('token', token);
        msg('ln-msg', 'Logged in. Token saved.', 'success');
      } else {
        msg('ln-msg', d.error, 'error');
      }
    }

    async function getProfile() {
      const r = await fetch('/api/profile', { headers: {'Authorization': 'Bearer ' + token} });
      const d = await r.json();
      const el = document.getElementById('pf-data');
      if (r.ok) {
        el.innerHTML = '<pre>' + JSON.stringify(d, null, 2) + '</pre>';
      } else {
        el.innerHTML = '<div class="msg error">' + d.error + '</div>';
      }
    }

    async function updateProfile() {
      const username = document.getElementById('pf-username').value;
      const r = await fetch('/api/profile', { method: 'PUT', headers: {'Content-Type':'application/json','Authorization':'Bearer ' + token}, body: JSON.stringify({username}) });
      const d = await r.json();
      msg('pf-msg', d.message || d.error, r.ok ? 'success' : 'error');
    }
  </script>
</body>
</html>
